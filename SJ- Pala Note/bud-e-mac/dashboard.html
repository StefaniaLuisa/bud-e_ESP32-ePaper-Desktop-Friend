<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bud-E</title>
<style>
  :root{
    --bg:#0f1117; --panel:#171a23; --panel2:#1f2330; --line:#2a2f3d;
    --ink:#e8eaf0; --dim:#9aa3b2; --accent:#7c9cff; --good:#5fd38d; --warn:#f0c36d;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
  header{display:flex;align-items:center;gap:12px;padding:18px 22px;border-bottom:1px solid var(--line);
    position:sticky;top:0;background:var(--bg);z-index:5}
  .eyes{display:flex;gap:6px}
  .eye{width:16px;height:22px;background:var(--ink);border-radius:6px}
  h1{font-size:18px;margin:0;letter-spacing:.5px}
  .status{margin-left:auto;font-size:13px;color:var(--dim)}
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--good);margin-right:6px}
  .dot.off{background:#e06b6b}
  nav{display:flex;gap:4px;padding:10px 16px;border-bottom:1px solid var(--line)}
  nav button{background:none;border:0;color:var(--dim);padding:8px 14px;border-radius:8px;cursor:pointer;font-size:14px}
  nav button.active{background:var(--panel2);color:var(--ink)}
  main{padding:18px 22px;max-width:820px;margin:0 auto}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin-bottom:14px}
  .card .top{display:flex;align-items:baseline;gap:10px}
  .card h3{margin:0;font-size:16px}
  .when{margin-left:auto;color:var(--dim);font-size:12px;white-space:nowrap}
  .tag{font-size:11px;color:var(--accent);border:1px solid var(--accent);border-radius:20px;padding:1px 9px}
  .summary{color:var(--dim);margin:8px 0 0}
  ul.todos{margin:10px 0 0;padding-left:18px}
  ul.todos li{color:var(--ink)}
  .badges{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
  .badge{font-size:11px;color:var(--dim);background:var(--panel2);border-radius:20px;padding:3px 10px}
  .badge.both{color:var(--good)} .badge.dash{color:var(--warn)}
  button.play{background:var(--panel2);border:1px solid var(--line);color:var(--ink);border-radius:20px;
    padding:4px 12px;font-size:12px;cursor:pointer;margin-top:12px}
  .conv{display:flex;flex-direction:column;gap:4px;margin-bottom:14px}
  .bubble{padding:9px 13px;border-radius:14px;max-width:80%}
  .you{align-self:flex-end;background:var(--panel2)}
  .bud{align-self:flex-start;background:var(--panel);border:1px solid var(--line)}
  .who{font-size:11px;color:var(--dim);margin:0 6px}
  .empty{color:var(--dim);text-align:center;padding:40px 0}
  .kv{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--line);padding:12px 0;gap:12px}
  .kv:last-child{border:0}
  .muted{color:var(--dim);font-size:13px;margin-top:6px}
  input,select{background:var(--panel2);border:1px solid var(--line);color:var(--ink);
    border-radius:9px;padding:8px 10px;font:inherit;font-size:14px}
  input[type=text]{width:100%}
  button.btn{background:var(--panel2);border:1px solid var(--line);color:var(--ink);
    border-radius:9px;padding:8px 14px;font-size:13px;cursor:pointer}
  button.btn.primary{background:var(--accent);border-color:var(--accent);color:#0d1020;font-weight:600}
  button.btn:active{transform:translatey(1px)}
  .row{display:flex;gap:8px;align-items:center}
  .filters{display:flex;gap:8px;margin-bottom:14px}
  .filters input{flex:1}
  .ask-row{display:flex;gap:8px;margin-bottom:16px}
  .ask-row input{flex:1}
  .ret{font-size:11px;padding:2px 6px}
  .saved{color:var(--good);font-size:13px;margin-left:8px;opacity:0;transition:opacity .2s}
  .saved.show{opacity:1}
  .guide h2{font-size:15px;margin:0 0 10px;color:var(--accent);letter-spacing:.3px}
  .guide h2 .ico{margin-right:8px}
  .guide p{margin:0 0 8px;color:var(--ink)}
  .guide .sub{color:var(--dim);font-size:13px;margin:-4px 0 10px}
  .guide ul{margin:0;padding-left:18px}
  .guide li{margin:5px 0}
  .guide kbd{background:var(--panel2);border:1px solid var(--line);border-radius:6px;padding:1px 7px;font-size:12px;font-family:ui-monospace,monospace}
  .guide .two{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media(max-width:620px){.guide .two{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <div class="eyes"><div class="eye"></div><div class="eye"></div></div>
  <h1>BUD-E</h1>
  <div class="status"><span id="dot" class="dot off"></span><span id="statusText">connecting…</span></div>
</header>
<nav>
  <button data-tab="notes" class="active">Notes</button>
  <button data-tab="conversations">Conversations</button>
  <button data-tab="features">Features</button>
  <button data-tab="settings">Settings</button>
</nav>
<main>
  <section id="notes"></section>
  <section id="conversations" hidden></section>
  <section id="features" hidden></section>
  <section id="settings" hidden></section>
</main>

<script>
const $ = (s, el=document) => el.querySelector(s);
const esc = s => (s ?? "").replace(/[&<>]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
const fmtTime = iso => { try { return new Date(iso).toLocaleString([], {month:"short",day:"numeric",hour:"numeric",minute:"2-digit"}); } catch { return iso || ""; } };

async function getJSON(url){ const r = await fetch(url); if(!r.ok) throw new Error(r.status); return r.json(); }
async function postJSON(url, obj){ const r = await fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(obj)}); if(!r.ok) throw new Error(r.status); return r.json(); }

async function ping(){
  try { await fetch("/health"); $("#dot").className="dot"; $("#statusText").textContent="online"; }
  catch { $("#dot").className="dot off"; $("#statusText").textContent="offline"; }
}

// ── Notes (with search/filter + per-note retention) ───────────────────────────
let allNotes = [];
async function renderNotes(){
  try { allNotes = await getJSON("/api/notes"); } catch { allNotes = []; }
  const tags = [...new Set(allNotes.map(n=>n.tag).filter(Boolean))];
  $("#notes").innerHTML = `
    <div class="filters">
      <input type="text" id="noteSearch" placeholder="Search notes…" oninput="drawNotes()">
      <select id="tagFilter" onchange="drawNotes()">
        <option value="">All tags</option>
        ${tags.map(t=>`<option>${esc(t)}</option>`).join("")}
      </select>
    </div>
    <div id="noteList"></div>`;
  drawNotes();
}
function drawNotes(){
  const cont = $("#noteList");
  if(!allNotes.length){ cont.innerHTML = `<div class="empty">No notes yet.<div class="muted">Record a note on the device, then run <b>Sync</b> — it'll show up here.</div></div>`; return; }
  const term = ($("#noteSearch")?.value||"").toLowerCase();
  const tagF = $("#tagFilter")?.value||"";
  const list = allNotes.filter(n=>{
    const hay = (n.title+" "+n.summary+" "+(n.transcript||"")+" "+(n.todos||[]).join(" ")).toLowerCase();
    return (!term||hay.includes(term)) && (!tagF||n.tag===tagF);
  });
  if(!list.length){ cont.innerHTML = `<div class="empty">No matching notes.</div>`; return; }
  cont.innerHTML = list.map(noteCard).join("");
}
function noteCard(n){
  const todos = (n.todos||[]).map(t=>`<li>${esc(t)}</li>`).join("");
  const moving = n.retention==="dashboard_only" && n.on_device;
  const badge = !n.on_device ? `<span class="badge dash">dashboard only</span>`
    : moving ? `<span class="badge dash">moves to dashboard next sync</span>`
    : `<span class="badge both">on device + dashboard</span>`;
  return `<div class="card">
    <div class="top">
      <h3>${esc(n.title)}</h3>
      ${n.tag?`<span class="tag">${esc(n.tag)}</span>`:""}
      <span class="when">${fmtTime(n.created)}</span>
    </div>
    ${n.summary?`<p class="summary">${esc(n.summary)}</p>`:""}
    ${todos?`<ul class="todos">${todos}</ul>`:""}
    <div class="badges">${badge}</div>
    <div class="row" style="margin-top:12px">
      <button class="play" onclick="play(${n.id})">▶ play</button>
      <select class="ret" onchange="setRetention(${n.id}, this.value)">
        <option value="both" ${n.retention!=='dashboard_only'?'selected':''}>Keep on device + dashboard</option>
        <option value="dashboard_only" ${n.retention==='dashboard_only'?'selected':''}>Move to dashboard only</option>
      </select>
    </div>
  </div>`;
}
function play(id){ new Audio(`/api/audio?id=${id}`).play().catch(()=>{}); }
async function setRetention(id, retention){ try{ await postJSON("/api/note/retention",{id,retention}); }catch{} renderNotes(); }

// ── Conversations (with type-to-chat) ─────────────────────────────────────────
async function renderConversations(){
  let conv = [];
  try { conv = await getJSON("/api/conversations"); } catch {}
  const log = conv.length ? conv.slice().reverse().map(t => `
    <div class="conv">
      <div class="who" style="align-self:flex-end">you · ${fmtTime(t.ts)}</div>
      <div class="bubble you">${esc(t.heard)}</div>
      <div class="who">bud-e</div>
      <div class="bubble bud">${esc(t.reply)}</div>
    </div>`).join("") : `<div class="empty">No conversations yet.<div class="muted">Ask Bud-E below, or hold REC on the device.</div></div>`;
  $("#conversations").innerHTML = `
    <div class="ask-row">
      <input type="text" id="chatInput" placeholder="Type a question for Bud-E…" onkeydown="if(event.key==='Enter')sendChat()">
      <button class="btn primary" onclick="sendChat()">Ask</button>
      <button class="btn" id="briefBtn" onclick="runBriefing()" title="Generate and play today's briefing">🌅 Briefing</button>
      <button class="btn" id="wrapBtn" onclick="runWrapup()" title="Generate and play the end-of-day wrap-up">🌙 Wrap-up</button>
    </div>
    <div id="chatLog">${log}</div>`;
  $("#chatInput")?.focus();
}
async function runBriefing(){
  const b = $("#briefBtn"); if(b){ b.disabled=true; b.textContent="🌅 …"; }
  try {
    const r = await getJSON("/api/briefing");
    new Audio(`/say?text=${encodeURIComponent(r.reply)}`).play().catch(()=>{});
  } catch {}
  renderConversations();
}
async function runWrapup(){
  const b = $("#wrapBtn"); if(b){ b.disabled=true; b.textContent="🌙 …"; }
  try {
    const r = await getJSON("/api/wrapup");
    new Audio(`/say?text=${encodeURIComponent(r.reply)}`).play().catch(()=>{});
  } catch {}
  renderConversations();
}
async function sendChat(){
  const inp = $("#chatInput"); const text = inp.value.trim(); if(!text) return;
  inp.value=""; inp.disabled=true; inp.placeholder="Bud-E is thinking…";
  try { await postJSON("/api/ask-text",{text}); } catch {}
  renderConversations();
}

// ── Settings (editable voice + preview + retention policy) ─────────────────────
async function renderSettings(){
  let c={}, voices=[];
  try { c = await getJSON("/api/config"); } catch {}
  try { voices = await getJSON("/api/voices"); } catch {}
  $("#settings").innerHTML = `
    <div class="card">
      <div class="kv">
        <span>Voice</span>
        <div class="row">
          <select id="voiceSel">${voices.map(v=>`<option value="${esc(v.name)}" ${v.name===c.voice?'selected':''}>${esc(v.label||v.name)}</option>`).join("")}</select>
          <button class="btn" onclick="previewVoice()">▶ preview</button>
        </div>
      </div>
      <div class="kv">
        <span>Weather location</span>
        <input type="text" id="weatherLoc" value="${esc(c.weather_location||"Chicago")}" style="width:160px">
      </div>
      <div class="kv">
        <span>Auto-move notes older than</span>
        <div class="row"><input type="text" id="migDays" value="${esc(String(c.auto_migrate_days??30))}" style="width:56px"> days</div>
      </div>
      <div class="kv"><span>Knows about</span><b>${esc(Object.keys(c.sources||{}).filter(k=>c.sources[k]).join(", ")||"—")}</b></div>
      <div class="kv">
        <span>Meeting nudges</span>
        <div class="row">
          <label style="display:flex;align-items:center;gap:6px"><input type="checkbox" id="nudgeOn" ${c.nudges?'checked':''}> spoken heads-up</label>
          <input type="text" id="nudgeLead" value="${esc(String(c.nudge_lead_min??15))}" style="width:48px"> min before
        </div>
      </div>
      <div class="kv">
        <span>Nudge plays on</span>
        <div class="row">
          <select id="nudgeTarget">
            ${[["auto","Bud-E when on, else Mac"],["device","Bud-E device only"],["mac","Mac only"],["both","both"]].map(o=>`<option value="${o[0]}" ${o[0]===(c.nudge_target||"auto")?'selected':''}>${o[1]}</option>`).join("")}
          </select>
          <button class="btn" onclick="testNudge()" title="Queue a test nudge right now">🔔 test</button>
          <span class="muted">${c.device_online?"● Bud-E online":"○ Bud-E offline"}</span>
        </div>
      </div>
      <div class="kv">
        <span>Brain model</span>
        <select id="modelSel">
          ${(c.models||[]).map(m=>`<option value="${esc(m.id)}" ${m.id===c.claude_model?'selected':''}>${esc(m.label)} — ${esc(m.note)}</option>`).join("")}
        </select>
      </div>
      <div class="row" style="margin-top:16px">
        <button class="btn primary" onclick="saveSettings()">Save</button>
        <span id="savedMsg" class="saved">saved ✓</span>
      </div>
    </div>
    <div class="muted">Voice changes apply to new replies right away. Auto-move &amp; restore happen on the device's next Sync.</div>`;
}
function previewVoice(){
  const v = $("#voiceSel").value;
  new Audio(`/say?voice=${encodeURIComponent(v)}&text=${encodeURIComponent("Hi Stef, I am Bud-E, this is how I sound when talking out loud.")}`).play().catch(()=>{});
}
async function testNudge(){
  try { const r = await getJSON("/api/nudge/test");
    alert(r.device_online ? "Test nudge queued — Bud-E should speak it within ~30s." :
                            "Test nudge queued, but Bud-E isn't online (not in desk mode). It'll play on the Mac per your target setting, or when the device next polls."); } catch {}
}
async function saveSettings(){
  const voice = $("#voiceSel").value;
  const days = parseInt($("#migDays").value)||30;
  const weather_location = $("#weatherLoc").value.trim()||"Chicago";
  const claude_model = $("#modelSel").value;
  const nudges = $("#nudgeOn").checked;
  const nudge_lead_min = parseInt($("#nudgeLead").value)||15;
  const nudge_target = $("#nudgeTarget").value;
  try { await postJSON("/api/settings",{voice, auto_migrate_days:days, weather_location, claude_model, nudges, nudge_lead_min, nudge_target}); } catch {}
  const m = $("#savedMsg"); m.classList.add("show"); setTimeout(()=>m.classList.remove("show"), 1500);
}

// ── Features (data-driven from features.json so it stays in sync) ─────────────
async function renderFeatures(){
  let f = {};
  try { f = await getJSON("/api/features"); } catch {}
  const secs = f.sections || [];
  if(!secs.length){ $("#features").innerHTML = `<div class="empty">Feature guide unavailable.</div>`; return; }
  const head = `<div class="muted" style="margin-bottom:14px">${esc(f.intro||"")}
    ${f.firmware?`<br>Firmware <b>${esc(f.firmware)}</b> · updated ${esc(f.updated||"")}`:""}</div>`;
  const body = secs.map(s => `
    <div class="card guide">
      <h2><span class="ico">${esc(s.icon||"•")}</span>${esc(s.title||"")}</h2>
      ${s.note?`<p class="sub">${esc(s.note)}</p>`:""}
      <table style="width:100%;border-collapse:collapse">
        ${(s.rows||[]).map(r=>`<tr>
          <td style="padding:5px 12px 5px 0;white-space:nowrap;color:var(--accent);vertical-align:top"><b>${esc(r.do)}</b></td>
          <td style="padding:5px 0;color:var(--ink)">${esc(r.result)}</td>
        </tr>`).join("")}
      </table>
    </div>`).join("");
  $("#features").innerHTML = `<div class="guide">${head}${body}</div>`;
}

const renderers = { notes: renderNotes, conversations: renderConversations, features: renderFeatures, settings: renderSettings };
document.querySelectorAll("nav button").forEach(b => b.onclick = () => {
  document.querySelectorAll("nav button").forEach(x => x.classList.toggle("active", x===b));
  ["notes","conversations","features","settings"].forEach(t => $("#"+t).hidden = (t!==b.dataset.tab));
  renderers[b.dataset.tab]();
});

ping(); renderNotes();
setInterval(ping, 5000);
</script>
</body>
</html>
